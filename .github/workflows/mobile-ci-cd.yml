name: Mobile CI/CD - Build and Release

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ClientMobile/package-lock.json

      - name: Install dependencies
        working-directory: ClientMobile
        run: npm ci

      - name: Run linter
        working-directory: ClientMobile
        run: npm run lint

      - name: Type check
        working-directory: ClientMobile
        run: npx tsc --noEmit

  build:
    name: EAS Build
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    runs-on: ubuntu-latest
    outputs:
      build_url: ${{ steps.build.outputs.build_url }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ClientMobile/package-lock.json

      - name: Install dependencies
        working-directory: ClientMobile
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set Environment Variables
        working-directory: ClientMobile
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL_PRD }}" >> $GITHUB_ENV
            echo "EAS_PROFILE=preview-prd" >> $GITHUB_ENV
          else
            echo "EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL_HML }}" >> $GITHUB_ENV
            echo "EAS_PROFILE=preview-hml" >> $GITHUB_ENV
          fi

      - name: Build APK
        id: build
        working-directory: ClientMobile
        run: |
          # Executa o build e captura a URL do artefato
          eas build --platform android --profile ${{ env.EAS_PROFILE }} --non-interactive --local=false > build_output.txt
          cat build_output.txt
          BUILD_URL=$(grep -o 'https://expo.dev/artifacts/[^ ]*' build_output.txt | head -n 1)
          echo "build_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Get Version
        id: version
        working-directory: ClientMobile
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.ref_name }}" == "development" ]; then
            VERSION="${VERSION}-dev.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK from EAS URL
        run: |
          curl -L "${{ needs.build.outputs.build_url }}" -o foodclub-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ needs.build.outputs.version }}
          name: "FoodClub Mobile v${{ needs.build.outputs.version }}"
          body: |
            ## 📱 Mobile Release - ${{ github.ref_name }}
            
            Build gerado automaticamente via GitHub Actions.
            
            **Ambiente:** ${{ github.ref_name == 'main' && 'Produção 🚀' || 'Homologação 🧪' }}
            **Versão:** ${{ needs.build.outputs.version }}
            **EAS Build URL:** [Visualizar no Expo](${{ needs.build.outputs.build_url }})
            
            ---
            *O arquivo APK está anexado abaixo para instalação direta.*
          files: foodclub-${{ github.ref_name }}.apk
          prerelease: ${{ github.ref == 'refs/heads/development' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
